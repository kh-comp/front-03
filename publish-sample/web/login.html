<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대한항공 차세대 친환경 항공기 엔진 정비기반 시스템</title>
  <link rel="stylesheet" href="../css/import.css">
  <script src="../js/jquery-3.6.0.js"></script>
  <script src="../js/script.js"></script>
</head>
<body>
    <div class="login-main-wrap">
        <header>
            <img src="../img/login-bg-logo.png">
        </header>
        <div class="login-wrap">
            <div class="login-box-left">
                <img src="../img/login-logo.png">
            </div>
            <div class="login-box-right">
                <h1>LOGIN</h1>
                <div class="login-input-box">
                    <div class="login-input">
                        <div class="login-input-cont">
                            <label>사번</label>
                            <input type="text" placeholder="사번을 입력해주세요.">
                        </div>
                        <div class="login-input-cont">
                            <label>비밀번호</label>
                            <input type="password" placeholder="비밀번호를 입력해주세요.">
                        </div>
                    </div>
                    <div class="re-id">
                            <ul>
                                <li>
                                    <input type="checkbox" id="idSaveCheck">
                                    <label>사번/비밀번호 저장</label>
                                </li>
                                <li>
                                	<a id="btn_Plus" title="패스워드" class="join">패스워드 변경</a>
                                </li>
                            </ul>
                    </div>
                    <button>로그인</button>
                    <!-- <div class="login-alram">
                        <span><img src="../img/login-alram.png"></span>아이디 또는 비밀번호를 확인해주세요.
                    </div> -->
                </div>
            </div>
        </div> <!-- login-wrap End -->
    </div><!--//sub-main-wrap-->
</body>
</html>
